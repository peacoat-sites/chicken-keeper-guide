name: Egg price data
on:
  schedule:
    - cron: '17 7 5 * *'
  workflow_dispatch: {}
jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: python pipeline/fetch_eggs.py
      - run: |
          git config user.name "data-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/eggs.json
          git diff --cached --quiet || git commit -m "data: refresh egg prices"
          git push

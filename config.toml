baseURL = "https://chickenkeeperguide.com/"
enableGitInfo = true
languageCode = "en-us"
title = "Chicken Keeper Guide"






enableRobotsTXT = true
enableEmoji = true

[pagination]
  pagerSize = 12

[params]
  page_bg = "#fef7ec"
  nav_style = "light"
  description = "Everything you need to raise healthy, happy backyard chickens,  breeds, coops, egg production, feeding, flock health, and more."
  niche = "Backyard Chickens & Poultry"
  adsense_id = "ca-pub-3466203197759215"
  adsense_slot_header = "auto"
  adsense_slot_incontent = "auto"
  adsense_slot_sidebar = "auto"
  image_query = "backyard chickens hen flock coop"
  author = "Chicken Keeper Guide Editorial Team"
  logo_text = "Chicken Keeper Guide"
  tagline = "Raise Happy Hens"
  cloudflare_analytics = ""

  # Authority theme
  monthly_readers = 58000
  research_hours  = 420
  satisfaction    = 96
  trust_extra     = "Backyard poultry keepers & certified flock advisors"
  impact_verification = ""
  impact_tracking_id  = ""
  persona_name       = "Ellen Barker"
  persona_title      = "Backyard Poultry Editor"
  persona_bio        = "Ellen has kept backyard chickens for over a decade on her small hobby farm. She covers flock management, coop design, egg production, and chicken health from a hands-on owner’s perspective,  practical guidance from someone who has made every beginner mistake so you don’t have to."
  persona_initials   = "EB"
  disclaimer         = "This site shares general backyard poultry guidance based on personal experience and research. Consult a licensed veterinarian for diagnosis and treatment of sick birds. Local zoning and ordinance requirements for backyard flocks vary,  always check your local regulations."

logo_text_1 = "Chicken"
logo_text_2 = "Keeper Guide"
primary_color = "#92400e"
hero_color_1 = "#0d0900"
hero_color_2 = "#1a1400"
hero_color_3 = "#fbbf24"
hero_color_4 = "#080600"
[taxonomies]
  category = "categories"
  tag = "tags"

[outputs]
  home = ["HTML", "RSS", "JSON"]
  section = ["HTML", "RSS"]

[sitemap]
  changefreq = "daily"
  priority = 0.5
  filename = "sitemap.xml"

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.tableOfContents]
    startLevel = 2
    endLevel   = 3
    ordered    = false

[permalinks]
  posts = "/:slug/"

[related]
  includeNewer = true
  threshold    = 80
  toLower      = false
  [[related.indices]]
    name   = "keywords"
    weight = 100
  [[related.indices]]
    name   = "tags"
    weight = 80
  [[related.indices]]
    name   = "categories"
    weight = 50

[services]
  [services.googleAnalytics]
    id = "G-NRT749P17X"
